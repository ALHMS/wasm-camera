<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasm Color Filter</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        video { display: none; }
        canvas { width: 90%; max-width: 600px; border: 2px solid #555; }
        .controls { margin: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <h1>Wasm Real-time Filter</h1>
    
    <canvas id="canvas"></canvas>
    <video id="video" autoplay playsinline muted></video>

    <div class="controls">
        <div>
            探す色: <input type="color" id="targetColor" value="#ff0000">
        </div>
        <div>
            変える色: <input type="color" id="replaceColor" value="#00ff00">
        </div>
        <div>
            許容誤差: <input type="range" id="tolerance" min="0" max="100" value="40">
        </div>
    </div>

    <script src="processor.js"></script>
    <script src="main.js"></script>
</body>
</html>
